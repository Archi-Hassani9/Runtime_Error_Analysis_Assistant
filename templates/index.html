<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runtime Error Analysis Assistant</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #eef4ff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 420px;
            height: 650px;
            background: #f9fbff;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #d0dcff;
        }

        .chat-header {
            background: #3b6ff5;
            color: white;
            padding: 18px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 20px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #eef4ff;
        }

        .message {
            max-width: 80%;
            padding: 12px 14px;
            border-radius: 12px;
            line-height: 1.4;
            font-size: 14px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .user-message {
            align-self: flex-end;
            background: #3b6ff5;
            color: white;
            border-bottom-right-radius: 4px;
            justify-content: space-between;
            flex-direction: row-reverse; 
        }

        .bot-message {
            align-self: flex-start;
            background: #dbe7ff;
            color: #222;
            border-bottom-left-radius: 4px;
        }

        .emoji {
            font-size: 16px;
        }

        .chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #d0dcff;
            background: #f9fbff;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #b5c7ff;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        .chat-input-area button {
            margin-left: 10px;
            padding: 12px 18px;
            border: none;
            background: #3b6ff5;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .chat-input-area button:hover {
            background: #2a55d4;
        }

        .typing {
            font-style: italic;
            font-size: 13px;
            padding-left: 15px;
            color: #555;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>ErrorSense AI</h2>
        <p>Runtime Error Analysis Assistant</p>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message bot-message">
            <span class="emoji">⚡</span>
            Hello! I am Runtime Error Analysis Assistant.
I can help you understand common runtime errors, their causes, and solutions.
        </div>
    </div>

    <div class="typing" id="typing"></div>

    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Ask your question..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const inputField = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const typing = document.getElementById("typing");

    const userText = inputField.value.trim();
    if (userText === "") return;

    // User message
    const userMessage = document.createElement("div");
    userMessage.classList.add("message", "user-message");
    userMessage.innerHTML = `<span class="emoji">👤</span> ${userText}`;
    chatBox.appendChild(userMessage);

    inputField.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    typing.textContent = "Assistant is typing...";

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: userText })
        });

        const data = await response.json();
        typing.textContent = "";

        // Bot message
        const botMessage = document.createElement("div");
        botMessage.classList.add("message", "bot-message");
        botMessage.innerHTML = `<span class="emoji">⚡</span> ${data.response}`;
        chatBox.appendChild(botMessage);

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        typing.textContent = "";

        const errorMessage = document.createElement("div");
        errorMessage.classList.add("message", "bot-message");
        errorMessage.innerHTML = `<span class="emoji">⚡</span> Error connecting to server.`;
        chatBox.appendChild(errorMessage);
    }
}

// Enter key support
document.getElementById("user-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
